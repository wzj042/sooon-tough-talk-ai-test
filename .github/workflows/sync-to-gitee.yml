name: Sync to Gitee

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: # 允许手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 获取完整历史记录

      - name: Set repository name
        id: set-repo
        run: |
          if [ -z "${{ secrets.GITEE_REPO_NAME }}" ]; then
            echo "repo_name=${{ github.event.repository.name }}" >> $GITHUB_OUTPUT
          else
            echo "repo_name=${{ secrets.GITEE_REPO_NAME }}" >> $GITHUB_OUTPUT
          fi

      - name: Sync to Gitee (HTTPS)
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git remote add gitee https://${{ secrets.GITEE_USERNAME }}:${{ secrets.GITEE_TOKEN }}@gitee.com/${{ secrets.GITEE_USERNAME }}/${{ steps.set-repo.outputs.repo_name }}.git || true
          git push gitee --all --force
          git push gitee --tags --force

      # 或者使用 SSH 方式（需要配置 GITEE_SSH_PRIVATE_KEY）
